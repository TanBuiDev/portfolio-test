name: Build and Push Docker Image to Docker Hub

on:
  push:
    branches: ["main"]

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      # Buoc 1: Tai ma nguon ve
      - name: Checkout code
        uses: actions/checkout@v4

      # Buoc 2: Dang nhap Docker Hub bang Secrets
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Buoc 3: Build va Push Image len Docker Hub (voi tags)
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-app:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/portfolio-app:v1.0
